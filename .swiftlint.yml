included:
  - Sources
  - Tests

opt_in_rules:
  - empty_count
  - closure_spacing
  - force_unwrapping
  - implicitly_unwrapped_optional
  - overridden_super_call
  - private_outlet
  - vertical_whitespace_closing_braces

disabled_rules:
  - trailing_whitespace

type_body_length:
  warning: 400
  error: 500

file_length:
  warning: 500
  error: 600

function_body_length:
  warning: 60
  error: 80

cyclomatic_complexity:
  warning: 15
  error: 20

line_length:
  warning: 140
  error: 160
  ignores_comments: true

identifier_name:
  min_length:
    warning: 2
  max_length:
    warning: 45
  allowed_symbols: "_"
  excluded:
    - id
    - db
    - r
    - ui
    - on
